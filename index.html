<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學校活動 FB 貼文生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --primary-light: #EFF6FF;
    --primary-mid: #BFDBFE;
    --accent: #0EA5E9;
    --success: #10B981;
    --warn: #F59E0B;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --text-light: #94A3B8;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(37,99,235,0.07), 0 1px 4px rgba(0,0,0,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  header span {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    background: var(--primary-light);
    color: var(--primary);
    padding: 2px 9px;
    border-radius: 20px;
    margin-left: 4px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 69px);
  }
  .panel {
    padding: 28px 32px;
    overflow-y: auto;
  }
  .panel-left { border-right: 1px solid var(--border); background: var(--surface); }
  .panel-right { background: var(--bg); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field-group { margin-bottom: 22px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 7px;
  }
  label .req { color: var(--primary); margin-left: 2px; }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.18s, box-shadow 0.18s;
    outline: none;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  textarea { min-height: 70px; line-height: 1.6; }

  /* 照片上傳區 */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    position: relative;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-hint { font-size: 13px; color: var(--text-muted); }
  .upload-hint strong { color: var(--primary); }

  /* 已上傳照片縮圖列 */
  .photo-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .photo-thumb {
    position: relative;
    width: 72px; height: 72px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid var(--border);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .remove-btn {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  /* 選項標籤群 */
  .tag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .tag-option {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text-muted);
    user-select: none;
  }
  .tag-option.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 500;
  }

  /* 生成按鈕 */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .generate-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* 右側輸出區 */
  .output-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-light);
    text-align: center;
    gap: 12px;
  }
  .output-placeholder .icon { font-size: 48px; opacity: 0.4; }
  .output-placeholder p { font-size: 14px; line-height: 1.7; max-width: 220px; }

  /* Loading 動畫 */
  .loading-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--primary-mid);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-steps { font-size: 13px; color: var(--text-muted); text-align: center; }
  .loading-steps .step { padding: 4px 0; transition: all 0.3s; }
  .loading-steps .step.active { color: var(--primary); font-weight: 500; }
  .loading-steps .step.done { color: var(--success); }

  /* 輸出卡片 */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .result-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header .fb-badge {
    display: flex; align-items: center; gap: 8px;
    color: #fff;
    font-size: 13px; font-weight: 700;
  }
  .result-header .fb-badge .dot {
    width: 8px; height: 8px;
    background: #4ADE80;
    border-radius: 50%;
    box-shadow: 0 0 6px #4ADE80;
  }

  .result-body {
    padding: 20px;
  }
  .fb-post-preview {
    background: #F0F2F5;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .fb-profile-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .fb-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; font-weight: 700;
    flex-shrink: 0;
  }
  .fb-name { font-size: 14px; font-weight: 700; color: #050505; }
  .fb-time { font-size: 12px; color: #65676B; }
  .fb-post-text {
    font-size: 14px;
    line-height: 1.75;
    color: #050505;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* 照片預覽區 (結果) */
  .result-photos {
    display: grid;
    gap: 4px;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 12px;
  }
  .result-photos.one { grid-template-columns: 1fr; }
  .result-photos.two { grid-template-columns: 1fr 1fr; }
  .result-photos.three { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
  .result-photos.many { grid-template-columns: 1fr 1fr; }
  .result-photos img { width: 100%; height: 140px; object-fit: cover; display: block; }
  .result-photos.one img { height: 200px; }
  .result-photos.three img:first-child { grid-row: 1/3; height: 100%; }

  /* 액션 버튼 */
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    min-width: 80px;
  }
  .action-btn:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }
  .action-btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .action-btn.primary:hover { background: #1d4ed8; }
  .action-btn.success-flash {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  /* Hashtag 區塊 */
  .hashtag-block {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--primary-light);
    border-radius: 10px;
    border: 1px solid var(--primary-mid);
  }
  .hashtag-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--primary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hashtag-text {
    font-size: 13px;
    color: var(--primary);
    line-height: 1.8;
    word-break: break-word;
  }

  /* 建議說明 */
  .tip-block {
    margin-top: 12px;
    padding: 10px 14px;
    background: #FFFBEB;
    border-radius: 10px;
    border: 1px solid #FDE68A;
    font-size: 12px;
    color: #92400E;
    line-height: 1.6;
  }

  .error-box {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 16px;
    color: #991B1B;
    font-size: 14px;
    line-height: 1.6;
  }

  /* 貼文版本切換 */
  .version-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .version-tab {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text-muted);
  }
  .version-tab.active {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
    font-weight: 600;
  }

  .model-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .model-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    text-align: center;
  }
  .model-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .model-card.active {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .model-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .model-card.active .model-name { color: var(--primary); }
  .model-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }


    .layout { grid-template-columns: 1fr; height: auto; }
    .panel { padding: 20px 16px; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">✏️</div>
  <h1>學校活動 FB 貼文生成器 <span>AI 驅動</span></h1>
</header>

<div class="layout">
  <!-- 左側：輸入表單 -->
  <div class="panel panel-left">

    <div class="section-label">API 設定</div>

    <div class="field-group">
      <label>Gemini API 金鑰 <span class="req">*</span></label>
      <div style="position:relative;">
        <input type="password" id="api-key" placeholder="AIza..." style="padding-right:70px;">
        <button onclick="toggleApiKey()" id="toggle-btn" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:11px;color:#64748B;padding:4px 6px;">顯示</button>
      </div>
      <div style="font-size:11px;color:#94A3B8;margin-top:5px;">🔒 金鑰僅存於你的瀏覽器，不會上傳至任何伺服器</div>
      <div style="margin-top:6px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;cursor:pointer;">
          <input type="checkbox" id="remember-key" style="width:auto;"> 記住金鑰（存於瀏覽器）
        </label>
      </div>
    </div>

    <div class="section-label">活動資訊</div>

    <div class="field-group">
      <label>活動名稱 <span class="req">*</span></label>
      <input type="text" id="event-name" placeholder="例：113學年度校慶運動會" maxlength="50">
    </div>

    <div class="field-group">
      <label>活動日期</label>
      <input type="text" id="event-date" placeholder="例：114年5月16日（五）">
    </div>

    <div class="field-group">
      <label>活動補充說明（選填）</label>
      <textarea id="event-desc" placeholder="可補充：參與班級、特色亮點、人數、特別感謝…等"></textarea>
    </div>

    <div class="section-label">貼文風格</div>

    <div class="field-group">
      <label>貼文語氣</label>
      <div class="tag-group" id="tone-group">
        <div class="tag-option active" data-value="溫馨活潑">🌟 溫馨活潑</div>
        <div class="tag-option" data-value="正式莊重">📋 正式莊重</div>
        <div class="tag-option" data-value="輕鬆有趣">😄 輕鬆有趣</div>
        <div class="tag-option" data-value="感性溫情">💛 感性溫情</div>
      </div>
    </div>

    <div class="field-group">
      <label>貼文長度</label>
      <div class="tag-group" id="length-group">
        <div class="tag-option" data-value="簡短">簡短（50字內）</div>
        <div class="tag-option active" data-value="適中">適中（100字）</div>
        <div class="tag-option" data-value="詳細">詳細（200字）</div>
      </div>
    </div>

    <div class="field-group">
      <label>加入元素</label>
      <div class="tag-group" id="element-group">
        <div class="tag-option active" data-value="emoji">😊 Emoji</div>
        <div class="tag-option active" data-value="hashtag">#️⃣ Hashtag</div>
        <div class="tag-option" data-value="互動問句">💬 互動問句</div>
        <div class="tag-option" data-value="號召行動">📣 號召分享</div>
      </div>
    </div>

    <div class="section-label">照片上傳（選填）</div>

    <div class="field-group">
      <div class="upload-area" id="upload-area">
        <input type="file" id="photo-input" accept="image/*" multiple>
        <div class="upload-icon">📷</div>
        <div class="upload-hint"><strong>點擊上傳</strong>或拖曳照片至此</div>
        <div class="upload-hint" style="margin-top:4px;font-size:11px;">支援 JPG、PNG，可多選</div>
      </div>
      <div class="photo-grid" id="photo-grid"></div>
    </div>

    <div class="section-label">AI 模型</div>

    <div class="field-group">
      <div class="model-cards" id="model-group">
        <div class="model-card" data-model="gemini-2.0-flash-lite">
          <div class="model-name">⚡ Flash Lite</div>
          <div class="model-desc">最快速・適合簡短貼文</div>
        </div>
        <div class="model-card active" data-model="gemini-2.0-flash">
          <div class="model-name">✨ Flash 2.0</div>
          <div class="model-desc">均衡首選・品質與速度兼顧</div>
        </div>
        <div class="model-card" data-model="gemini-2.5-pro-preview-06-05">
          <div class="model-name">🧠 Pro 2.5</div>
          <div class="model-desc">最強品質・適合重要活動</div>
        </div>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn" onclick="generatePost()">
      ✨ 生成 FB 貼文
    </button>

  </div>

  <!-- 右側：輸出結果 -->
  <div class="panel panel-right" id="output-panel">
    <div class="output-placeholder" id="placeholder">
      <div class="icon">📱</div>
      <p>填寫左側活動資訊，<br>按下生成按鈕，<br>貼文馬上出爐！</p>
    </div>
  </div>
</div>

<script>
// API 金鑰 顯示/隱藏 & 記住
function toggleApiKey() {
  const input = document.getElementById('api-key');
  const btn = document.getElementById('toggle-btn');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '隱藏'; }
  else { input.type = 'password'; btn.textContent = '顯示'; }
}

// 載入時讀取已儲存的金鑰
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('anthropic_api_key');
  if (saved) {
    document.getElementById('api-key').value = saved;
    document.getElementById('remember-key').checked = true;
  }
});

// 模型選擇
document.querySelectorAll('#model-group .model-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('#model-group .model-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
  });
});

// 多選標籤邏輯
document.querySelectorAll('#element-group .tag-option').forEach(tag => {
  tag.addEventListener('click', () => tag.classList.toggle('active'));
});
// 單選標籤邏輯
['tone-group', 'length-group'].forEach(groupId => {
  document.querySelectorAll(`#${groupId} .tag-option`).forEach(tag => {
    tag.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} .tag-option`).forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
    });
  });
});

// 照片上傳
let uploadedPhotos = []; // {file, url}
const uploadArea = document.getElementById('upload-area');
const photoInput = document.getElementById('photo-input');
const photoGrid = document.getElementById('photo-grid');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
photoInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const url = URL.createObjectURL(file);
    uploadedPhotos.push({ file, url });
    renderPhotoGrid();
  });
}
function renderPhotoGrid() {
  photoGrid.innerHTML = '';
  uploadedPhotos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${p.url}"><button class="remove-btn" onclick="removePhoto(${i})">×</button>`;
    photoGrid.appendChild(div);
  });
}
function removePhoto(i) {
  uploadedPhotos.splice(i, 1);
  renderPhotoGrid();
}

// 讀取照片為 base64
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// 主生成函式
async function generatePost() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey || !apiKey.startsWith('AIza')) {
    document.getElementById('api-key').style.borderColor = '#EF4444';
    setTimeout(() => document.getElementById('api-key').style.borderColor = '', 2000);
    alert('請先填入正確的 Gemini API 金鑰（以 AIza 開頭）');
    return;
  }
  // 記住金鑰
  if (document.getElementById('remember-key').checked) {
    localStorage.setItem('anthropic_api_key', apiKey);
  } else {
    localStorage.removeItem('anthropic_api_key');
  }

  const eventName = document.getElementById('event-name').value.trim();
  if (!eventName) {
    document.getElementById('event-name').focus();
    document.getElementById('event-name').style.borderColor = '#EF4444';
    setTimeout(() => document.getElementById('event-name').style.borderColor = '', 2000);
    return;
  }

  const eventDate = document.getElementById('event-date').value.trim();
  const eventDesc = document.getElementById('event-desc').value.trim();
  const tone = document.querySelector('#tone-group .active')?.dataset.value || '溫馨活潑';
  const length = document.querySelector('#length-group .active')?.dataset.value || '適中';
  const elements = [...document.querySelectorAll('#element-group .active')].map(t => t.dataset.value);

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;

  showLoading();

  try {
    // 組裝 prompt
    let prompt = `你是一位台灣小學粉絲專頁的社群小編，請幫我撰寫一篇 Facebook 粉絲專頁貼文。

活動名稱：${eventName}`;
    if (eventDate) prompt += `\n活動日期：${eventDate}`;
    if (eventDesc) prompt += `\n補充說明：${eventDesc}`;
    prompt += `\n\n要求：
- 語氣風格：${tone}
- 貼文長度：${length}
- 請加入的元素：${elements.join('、') || '無特別要求'}
- 請以台灣繁體中文撰寫
- 貼文內容應適合學校官方粉絲專頁
${uploadedPhotos.length > 0 ? `- 我已附上 ${uploadedPhotos.length} 張活動照片，請在文案中適當描述照片內容，並建議附圖說明` : ''}

請輸出以下 JSON 格式（只輸出 JSON，不要有其他文字）：
{
  "post": "主要貼文內容（含emoji，不含hashtag）",
  "hashtags": "所有hashtag，空格分隔，例：#校慶 #運動會",
  "photo_caption": "建議的照片說明文字（1-2句）",
  "tip": "一句發文小建議（例如：建議搭配精選照片，在活動結束當天下午發布，互動率較高）"
}`;

    // 組裝 Gemini parts（含照片）
    const parts = [];
    if (uploadedPhotos.length > 0) {
      for (const p of uploadedPhotos) {
        const b64 = await fileToBase64(p.file);
        const mime = p.file.type || 'image/jpeg';
        parts.push({ inline_data: { mime_type: mime, data: b64 } });
      }
    }
    parts.push({ text: prompt });

    const model = document.querySelector('#model-group .active')?.dataset.model || 'gemini-2.0-flash';
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { maxOutputTokens: 1000, temperature: 0.8 }
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'Gemini API 錯誤');
    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    
    // 解析 JSON
    let result;
    try {
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : rawText);
    } catch {
      result = { post: rawText, hashtags: '', photo_caption: '', tip: '' };
    }

    showResult(result, eventName);

  } catch (err) {
    showError(err.message || '發生錯誤，請稍後再試。');
  } finally {
    btn.disabled = false;
  }
}

function showLoading() {
  const steps = ['🔍 分析活動資訊…', '✍️ 撰寫貼文內容…', '🏷️ 產生 Hashtag…', '✅ 完成最後調整…'];
  let current = 0;
  const panel = document.getElementById('output-panel');
  panel.innerHTML = `
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-steps" id="loading-steps">
        ${steps.map((s, i) => `<div class="step" id="step-${i}">${s}</div>`).join('')}
      </div>
    </div>`;
  const interval = setInterval(() => {
    if (current > 0) document.getElementById(`step-${current-1}`)?.classList.replace('active','done');
    const el = document.getElementById(`step-${current}`);
    if (el) el.classList.add('active');
    current++;
    if (current >= steps.length) clearInterval(interval);
  }, 600);
}

function showResult(result, eventName) {
  const panel = document.getElementById('output-panel');
  const hasPhotos = uploadedPhotos.length > 0;
  const schoolInitial = '校';

  const photosHTML = hasPhotos ? buildPhotoGrid() : '';

  panel.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="fb-badge">
          <div class="dot"></div>
          FB 貼文草稿已生成
        </div>
        <span style="color:rgba(255,255,255,0.7);font-size:12px;">${new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      <div class="result-body">

        <div class="version-tabs">
          <div class="version-tab active">預覽</div>
          <div class="version-tab" onclick="switchToRaw()">純文字</div>
        </div>

        <!-- FB 風格預覽 -->
        <div id="preview-view">
          <div class="fb-post-preview">
            <div class="fb-profile-row">
              <div class="fb-avatar">${schoolInitial}</div>
              <div>
                <div class="fb-name">學校官方粉絲專頁</div>
                <div class="fb-time">剛剛 · 🌐</div>
              </div>
            </div>
            <div class="fb-post-text" id="post-text">${escHtml(result.post)}</div>
            ${result.hashtags ? `<div class="fb-post-text" style="margin-top:8px;color:#1877F2;">${escHtml(result.hashtags)}</div>` : ''}
            ${photosHTML}
          </div>

          ${result.hashtags ? `
          <div class="hashtag-block">
            <div class="hashtag-title"># Hashtag 建議</div>
            <div class="hashtag-text">${escHtml(result.hashtags)}</div>
          </div>` : ''}

          ${result.tip ? `
          <div class="tip-block">
            💡 <strong>小建議：</strong>${escHtml(result.tip)}
          </div>` : ''}
        </div>

        <!-- 純文字 -->
        <div id="raw-view" style="display:none;">
          <textarea id="raw-textarea" style="width:100%;min-height:200px;font-size:13px;line-height:1.8;border:1.5px solid var(--border);border-radius:10px;padding:14px;font-family:inherit;resize:vertical;color:var(--text);" readonly>${result.post}${result.hashtags ? '\n\n' + result.hashtags : ''}</textarea>
        </div>

        <div class="action-row">
          <button class="action-btn primary" id="copy-btn" onclick="copyPost('${escAttr(result.post)}', '${escAttr(result.hashtags)}')">
            📋 複製貼文
          </button>
          <button class="action-btn" onclick="generatePost()">🔄 重新生成</button>
        </div>
        ${result.photo_caption ? `<div style="font-size:12px;color:var(--text-muted);margin-top:10px;">📸 附圖說明建議：${escHtml(result.photo_caption)}</div>` : ''}
      </div>
    </div>`;
}

function buildPhotoGrid() {
  const n = uploadedPhotos.length;
  const cls = n === 1 ? 'one' : n === 2 ? 'two' : n === 3 ? 'three' : 'many';
  const show = uploadedPhotos.slice(0, n === 3 ? 3 : 4);
  return `<div class="result-photos ${cls}">${show.map(p => `<img src="${p.url}">`).join('')}</div>`;
}

function switchToRaw() {
  document.querySelectorAll('.version-tab').forEach((t,i) => t.classList.toggle('active', i===1));
  document.getElementById('preview-view').style.display = 'none';
  document.getElementById('raw-view').style.display = 'block';
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('version-tab') && e.target.textContent === '預覽') {
    document.querySelectorAll('.version-tab').forEach((t,i) => t.classList.toggle('active', i===0));
    document.getElementById('preview-view').style.display = 'block';
    document.getElementById('raw-view').style.display = 'none';
  }
});

function copyPost(post, hashtags) {
  const text = post + (hashtags ? '\n\n' + hashtags : '');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 已複製！';
    btn.classList.add('success-flash');
    setTimeout(() => { btn.textContent = '📋 複製貼文'; btn.classList.remove('success-flash'); }, 2000);
  });
}

function showError(msg) {
  document.getElementById('output-panel').innerHTML = `
    <div class="error-box">
      <strong>⚠️ 生成失敗</strong><br>${msg}<br><br>
      請確認網路連線，或稍後再試。
    </div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s||'').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}
</script>
</body>
</html>
